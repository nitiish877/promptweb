<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    font-family:Arial, Helvetica, sans-serif;
}

.login-card{
    width:90%;
    max-width:400px;
    background:#1a1a1a;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.login-card h2{
    text-align:center;
    margin-bottom:25px;
    color:white;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111;
    color:white;
    font-size:15px;
    margin-bottom:15px;
}

input:focus{
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#0d6efd;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.back-link{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#aaa;
    text-decoration:none;
}

.back-link:hover{
    color:white;
}

@media(max-width:480px){

    .login-card{
        padding:25px;
    }

    .login-card h2{
        font-size:1.4rem;
    }
}

</style>
</head>

<body>

<div class="login-card">

    <h2>Admin Login</h2>

    <form method="POST">

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <a href="/" class="back-link">
        Back to Gallery
    </a>

</div>

</body>
</html>
